<svg xmlns="http://www.w3.org/2000/svg" viewBox="225 50 234 232" role="img">
  <title>Fin Group logomark</title>

  <!-- Blue offset card -->
  <rect x="234" y="58" width="220" height="220" rx="20" fill="#1565C0"/>
  <!-- White card -->
  <rect x="230" y="55" width="220" height="220" rx="20" fill="#ffffff" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- F stem -->
  <rect x="282" y="95" width="22" height="140" rx="3" fill="#1a3d2b"/>
  <!-- F top bar -->
  <rect x="282" y="95" width="100" height="22" rx="3" fill="#1a3d2b"/>
  <!-- F mid bar — gold -->
  <rect x="282" y="153" width="72" height="18" rx="3" fill="#b8960c"/>

  <!-- Growth arrow — gold -->
  <polygon points="376,218 408,148 440,218" fill="#b8960c" opacity="0.10"/>
  <line x1="408" y1="218" x2="408" y2="150" stroke="#b8960c" stroke-width="3" stroke-linecap="round"/>
  <polyline points="395,163 408,150 421,163" fill="none" stroke="#b8960c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="408" cy="218" r="4" fill="#b8960c"/>

  <!-- Gold accent bar bottom -->
  <rect x="250" y="250" width="160" height="4" rx="2" fill="#b8960c"/>
  <!-- Blue offset bar bottom -->
  <rect x="234" y="270" width="160" height="4" rx="2" fill="#1565C0"/>
</svg>
