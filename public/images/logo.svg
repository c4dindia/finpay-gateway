<svg viewBox="0 0 230 235" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Fin Group F mark — dark mode</title>

  <!-- F stem -->
  <rect x="57" y="45" width="22" height="140" rx="3" fill="#5dd99a"/>
  <!-- F top bar -->
  <rect x="57" y="45" width="100" height="22" rx="3" fill="#5dd99a"/>
  <!-- F mid bar — gold -->
  <rect x="57" y="103" width="72" height="18" rx="3" fill="#e8c44d"/>

  <!-- Growth triangle — gold tinted -->
  <polygon points="151,168 183,98 215,168" fill="#e8c44d" opacity="0.16"/>
  <!-- Arrow vertical line -->
  <line x1="183" y1="168" x2="183" y2="100" stroke="#e8c44d" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="170,113 183,100 196,113" fill="none" stroke="#e8c44d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow base dot -->
  <circle cx="183" cy="168" r="4" fill="#e8c44d"/>

  <!-- Gold accent strip -->
  <rect x="25" y="200" width="160" height="4" rx="2" fill="#e8c44d"/>
  <!-- Blue accent strip (offset down-left) -->
  <rect x="9" y="220" width="160" height="4" rx="2" fill="#5b9eff"/>
</svg>
